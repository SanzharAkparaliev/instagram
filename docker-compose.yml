version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_db
    environment:
      POSTGRES_DB: instagram_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: crm_password_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: crm_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: instagram_crm
      DB_USER: postgres
      DB_PASSWORD: crm_password_2024
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      FRONTEND_URL: http://147.45.219.116
      PARSER_SECRET: parser_internal_secret
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  parser:
    build: ./parser
    container_name: crm_parser
    environment:
      BACKEND_URL: http://backend:5000/api
      PARSER_SECRET: parser_internal_secret
    depends_on:
      - backend
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  login-server:
    build: ./login-server
    container_name: crm_login
    environment:
      BACKEND_URL: http://backend:5000
      PARSER_SECRET: parser_internal_secret
    depends_on:
      - backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    shm_size: '256m'
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: crm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - login-server
    restart: unless-stopped

volumes:
  pgdata:
